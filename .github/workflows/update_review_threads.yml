# Updates each motd.txt to include active review threads from the forums automagically
name: Auto Trialmin Review Threads
on:
  schedule:
    - cron: 0 0,6,12,18 * * *
  workflow_dispatch:

jobs:
  auto_review_threads:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install node-html-parser
      - name: Include trialmin review threads
        uses: actions/github-script@v9
        with:
          script: |
            const makeReviewThreads = require('${{ github.workspace }}/.github/workflows/autoReviewThreads.js');
            await makeReviewThreads({ glob });
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          title: Update Trialmin Review Threads
          branch: update-trialmin-threads
          body: Updates Trialmins Review Threads in all `motd.txt`
          commit-message: update trialmin threads list in motd.txt
          add-paths: '**/motd.txt'
      - name: Approve and merge pull request
        run: |
          gh pr merge --admin -md ${{ steps.cpr.outputs.pull-request-number }}
        env:
          GH_TOKEN: ${{ github.token }}

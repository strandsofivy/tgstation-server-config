# Updates each motd.txt to include active review threads from the forums automagically
name: Auto Trialmin Review Threads
on:
  schedule:
    - cron: 0 0,6,12,18 * * *
  workflow_dispatch:

jobs:
  auto_review_threads:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm install node-html-parser@7.1.0
      - name: Include trialmin review threads
        uses: actions/github-script@v9
        with:
          script: |
            const makeReviewThreads = require('${{ github.workspace }}/.github/workflows/autoReviewThreads.js');
            await makeReviewThreads({ glob });
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          title: Update Trialmin Review Threads
          branch: update-trialmin-threads
          body: Updates Trialmins Review Threads in all `motd.txt`
          commit-message: update trialmin threads list in motd.txt
          add-paths: '**/motd.txt'
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CI_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
      - name: Merge pull request
        if: ${{ steps.cpr.outputs.pull-request-operation  == "created" || steps.cpr.outputs.pull-request-operation == "updated" }}
        run: |
          gh pr merge --admin -md "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}